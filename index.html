function fmt(n) { return Number(n).toLocaleString(); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function isCredit(tx) { return tx.type===“income”||tx.type===“transfer_in”; }
function calcTodayBalance(acc) {
// 今日結餘 = 初始餘額 + 截至今日所有收支（不含未來）
var today = todayStr();
var pastTxs = (acc.transactions||[]).filter(function(tx){return tx.date<=today;});
var delta = pastTxs.reduce(function(s,tx){return s+(isCredit(tx)?tx.amount:-tx.amount);},0);
return acc.balance + delta;
}

function calcAvailable(acc) {
// 可動用餘額 = 今日結餘 - 未來支出（不扣未來收入）
var today = todayStr();
var futureExp = (acc.transactions||[]).filter(function(tx){return tx.date>today&&!isCredit(tx);}).reduce(function(s,tx){return s+tx.amount;},0);
return calcTodayBalance(acc) - futureExp;
}

function doUpdateTx(updated,syncStock){
var old=editTx||updated;
var newTxs=txs.map(function(t){return t.id===old.id?Object.assign({},t,updated):t;});

if(a.id!==old.linkedAccId)return a;
return Object.assign({},a,{transactions:(a.transactions||[]).map(function(t){
if(t.transferId!==old.transferId)return t;
return Object.assign({},t,{date:updated.date||t.date,amount:updated.amount!==undefined?updated.amount:t.amount,note:updated.note!==undefined?updated.note:t.note});
})});
});
onUpdate(acc,allNext);setAccount(acc);
return;
}

if(syncStock&&old.linkedId&&onUpdateLedger){
onUpdateLedger((ledger||[]).map(function(e){

return Object.assign({},e,{
amount:updated.amount!==undefined?updated.amount:e.amount,
// bank date change = settleDate on stock entry; tradeDate (e.date) stays
settleDate:updated.date||e.settleDate,
note:updated.note!==undefined?updated.note:e.note
});
}));
}
onUpdate(acc);setAccount(acc);
}

function updateTx(updated){
// If bank tx is linked to stock ledger, ask about sync
var old=editTx;
if(old&&old.linkedId){

return;
}
doUpdateTx(updated,false);
